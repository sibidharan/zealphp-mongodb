name: Tests

on:
  push:
    branches: [master, 'v*.*']
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    name: "Unit Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          tools: composer:v2
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit --testsuite Unit

  integration-tests:
    name: "Integration Tests (PHP ${{ matrix.php }}, MongoDB ${{ matrix.mongodb }})"
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
        mongodb: ['6.0', '7.0', '8.0']
    services:
      mongodb:
        image: mongo:${{ matrix.mongodb }}
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json
          tools: composer:v2
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Rust extension
        run: |
          cd ext
          cargo build --release
          sudo cp target/release/libzealphp_mongodb.so $(php -r "echo ini_get('extension_dir');")/zealphp_mongodb.so
          echo "extension=zealphp_mongodb.so" | sudo tee $(php --ini | grep "Scan for" | cut -d: -f2 | tr -d ' ')/99-zealphp-mongodb.ini
      - run: composer install --no-interaction --prefer-dist
      - run: vendor/bin/phpunit --testsuite Integration
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DATABASE: zealphp_test
